[build-system]
# Pin hatchling below 1.28 — hatchling >=1.28 emits
# ``Metadata-Version: 2.5`` which the pypa-publish action's bundled
# twine rejects with ``InvalidDistribution: '2.5' is not a valid
# metadata version`` (verified on the v0.21.6 release build,
# workflow run 26728715926). Hatchling 1.27 emits
# ``Metadata-Version: 2.4`` which twine accepts. Re-evaluate this
# pin when pypa/gh-action-pypi-publish ships a newer twine.
requires = ["hatchling<1.28"]
build-backend = "hatchling.build"

[project]
name = "scitex-agent-container"
version = "0.21.12"
description = "Declarative YAML-based framework for defining, managing, and orchestrating AI coding agent instances"
readme = "README.md"
license = "AGPL-3.0-only"
requires-python = ">=3.10"
authors = [
    { name = "Yusuke Watanabe", email = "ywatanabe@scitex.ai" },
]
keywords = [
    "scitex",
    "agent",
    "container",
    "claude-code",
    "orchestration",
    "yaml",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    # Round-trip YAML writer used by ``sac host add/remove/set`` so
    # operator-authored comments + key order in config.yaml survive a
    # sac-side edit. Read paths still use pyyaml (cheaper, no comment
    # bookkeeping).
    "ruamel.yaml>=0.18",
    "rich>=13.0",
    # Two distinct uses:
    #   1. `scitex_config._ecosystem.local_state` — canonical local-state
    #      directory helper (project-scope override + auto runtime/ seed
    #      creation) per scitex-python skill
    #      01_arch_06_local-state-directories.md.
    #   2. Public `PriorityConfig` + `load_dotenv` surface — used by
    #      `runtimes/_apptainer_provider.py` to resolve the provider
    #      auth token via the SciTeX-ecosystem `direct → config → env
    #      → default` cascade (see ADR-0011).
    # v0.3.0 was the release that split public from ecosystem-internal
    # and exposed both surfaces — that is our hard minimum.
    "scitex-config>=0.3.0",
    # 0.3.0 floor: sac's source-bundled ``sac image build`` delegates to
    # scitex-container's atomic ``build(...)`` (timestamped SIF + stable
    # symlink swap; failed build leaves the prior image intact). That API
    # — ``cwd`` (build context independent of ``output_dir``),
    # ``image_name``, ``retain``, Path return — landed in 0.3.0. See
    # cli_pkg/_image_source_build.py::_default_container_build.
    "scitex-container>=0.3.0",
    "scitex-logging>=0.1.5",
    "scitex-ssh>=1.0.0",
    # A2A protocol surface — Phase 1 SDK adoption (see GITIGNORED/A2A_MIGRATION.md).
    # `[http-server]` extras pull in starlette + sse-starlette for the
    # JSON-RPC + SSE routes we mount in `a2a/_server.py`.
    "a2a-sdk[http-server]>=1.0.2",
    # Anthropic's official SDK — backs the `claude_session` handler
    # (replaces the legacy `claude_cli` / `claude --print` path).
    "claude-agent-sdk>=0.1.0",
    "uvicorn>=0.27",
    # protobuf 6.x removed FieldDescriptor.label, which a2a-sdk 1.0.x's
    # validate_proto_required_fields still references — pin until upstream
    # adopts the descriptor pool API. See CI failure 2026-04-27.
    "protobuf<6",
]

[project.optional-dependencies]
mcp = [
    # F-CS15: sac MCP server. fastmcp 2.x and 3.x both supported via
    # the safe_mount shim (matches scitex-* package convention).
    "fastmcp>=2.0",
]
telegram = [
    "claude-code-telegrammer>=0.1.0",
]
notify = [
    # Operator notification surface for the OAuth login-relay (emails the
    # auth URL via `scitex_notification.send_email`). Optional + lazily
    # imported (a clear EmailRelayError is raised if absent), so core install
    # and CI need not resolve it. Agents that use the login-relay install
    # `scitex-agent-container[notify]`. NOT in `[all]` until 0.2.9 is on PyPI
    # (the public send_email landed in 0.2.9; PyPI currently tops out at 0.2.8).
    "scitex-notification>=0.2.9",
]
slurm = [
    # scitex-hpc 0.5.0 ships Reservation.from_jobid which sac uses to
    # dual-write a Reservation lease alongside its own state on start/stop.
    # Optional: sac's SlurmRuntime works without it (best-effort import).
    "scitex-hpc>=0.6.2",
]
dev = [
    # 0.17.12 floor: scitex-dev 0.16.0 introduced a TypeError in
    # `_check_bridge_pattern` that fires through `ecosystem audit-all`
    # and reds the `test_audit_all_clean` gate on this package. Fixed
    # upstream by 0.17.12 (proj-scitex-todo 720-test suite confirmed
    # clean on 0.17.12). Revert the floor to >=0.14.0 only if 0.17.12+
    # is later proved to regress the rule corpus we depend on.
    "scitex-dev>=0.17.12",  # tests/results/ accepted as a known tests subdir (PS-302)
    # PS210: tests import scitex_hpc unguarded, so [dev] must include it
    # (otherwise `pip install -e .[dev]` can't run the full suite).
    "scitex-hpc>=0.6.2",
    # `sac dev …` (rotate-secret + credential2apikey) imports
    # scitex_git for its gh-secret/variable wrappers + sha256 sidecar.
    # Keeping it in [dev] (not core deps) so a runtime install of sac
    # doesn't pull the gh CLI plumbing — only maintainers / CI rotation.
    "scitex-git>=0.3.0",
    "pytest>=7.0.0,<9.0.0",
    "pytest-cov>=4.0.0",
    "pytest-xdist>=3.0.0",
    # A2A v1.0 push-channel work (ADR-0001 commit 1) introduced async
    # tests against the inbox broker. STRICT asyncio mode keeps the
    # marker explicit per test, which matches the rest of the codebase
    # (no implicit-async-on-conftest surprises).
    "pytest-asyncio>=0.23",
    "pre-commit>=3.5.0",
    # MCP test surface (tests/scitex_agent_container/_mcp/) imports
    # fastmcp unconditionally; without it the entire _mcp/ suite is
    # collection-skipped on dev boxes. Keeping fastmcp also as a [mcp]
    # extra so runtime installs that only need the MCP server can
    # opt-in without pulling the rest of [dev].
    "fastmcp>=2.0",
]
docs = [
    "sphinx>=7.0",
    "sphinx-rtd-theme>=2.0",
    "myst-parser>=2.0",
    "sphinx-copybutton>=0.5",
    "sphinx-autodoc-typehints>=1.25",
]
# Convenience aggregate matching the README install hint
# (`pip install scitex-agent-container[all]`). Mirrors the union of
# every other extra so users don't have to memorise the matrix.
all = [
    "scitex-agent-container[mcp]",
    "scitex-agent-container[telegram]",
    "scitex-agent-container[slurm]",
    "scitex-agent-container[dev]",
    "scitex-agent-container[docs]",
]

[project.scripts]
scitex-agent-container = "scitex_agent_container.cli:cli_entry_point"
sac = "scitex_agent_container.cli:cli_entry_point"
sac-statusline = "scitex_agent_container.statusline:main"

[project.entry-points."scitex_dev.docs"]
scitex-agent-container = "scitex_agent_container"

[project.entry-points."scitex_dev.skills"]

scitex-agent-container = "scitex_agent_container"

[project.entry-points."scitex_dev.linter.plugins"]
scitex-agent-container = "scitex_agent_container._linter_plugin:get_plugin"

[project.entry-points."scitex_dev.jobs"]
scitex-agent-container = "scitex_agent_container._jobs_plugin:provide_jobs"

# C10 — sac's consumer on scitex-todo's shared card-event bus. When
# scitex-todo's board emits a card-event (commented / created /
# reassigned / status_changed / completed / committed / pushed /
# merged), this callable is invoked in the board's process; it resolves
# the card's owner + collaborators + subscribers and delivers the
# notification to each via the local ``sac listen`` daemon's
# ``/v1/notify`` router endpoint — so a CONTAINERIZED owner-agent (whose
# a2a port is unreachable inbound) still receives it. The consumer
# filters for the card-event kinds and ignores everything else, incl.
# sac's OWN liveness-tick anomaly events on the same bus. Bus-only
# contract: no import of scitex_todo.
[project.entry-points."scitex_todo.hooks"]
scitex-agent-container = "scitex_agent_container._listen._card_event_delivery:deliver_card_event"

[project.urls]
Homepage = "https://github.com/ywatanabe1989/scitex-agent-container"
Repository = "https://github.com/ywatanabe1989/scitex-agent-container.git"
Issues = "https://github.com/ywatanabe1989/scitex-agent-container/issues"
Documentation = "https://scitex-agent-container.readthedocs.io"

# scitex-dev audit configuration. Per-package opt-outs sit here per
# scitex-dev's documented precedent (the same [tool.scitex_dev] block
# is read by `is_mcp_parity_exempt` in
# scitex_dev/_cli/audit/_summary/_mcp_parity.py).
[tool.scitex_dev]
# §6 (audit-mcp-tools, Python-API ↔ MCP parity) — exempt by design.
#
# sac's MCP tool surface mirrors its CLI subcommand surface (which in
# turn wraps internal handlers); the public Python API
# (`scitex_agent_container.<noun>.<verb>`) is a thin re-export of the
# SAME handlers, not a 1:1 parent of the MCP tools. The auditor's
# name-derivation algorithm (`<noun>_<verb>` flatten) consequently sees
# 4 "orphan" MCP tools that are real working features with their own
# canonical names:
#
#   * agent_spawn         — in-container spawn → spawn-proxy (ADR-0010).
#                           MCP-only by design; no CLI/Python counterpart.
#   * list_python_apis    — introspection helper. CLI path:
#                           `sac info list-python-apis`. The closest
#                           Python noun is `sac.mcp.list_tools`, which
#                           is a different concept (FastMCP server's
#                           registered tools, not "all Python APIs").
#   * quota_watch         — account-quota watcher. CLI path:
#                           `sac account watch-quota`. The matching
#                           Python noun is `sac.account.watch_quota`
#                           (flattened: `account_watch_quota`) — the
#                           MCP tool's word order is intentionally the
#                           verb-first form that MCP clients read more
#                           naturally.
#   * subagent_get_state  — subagent state introspection. CLI path:
#                           `sac subagent get-state`. There is no
#                           `sac.subagent` noun submodule today; adding
#                           one purely to satisfy the auditor's
#                           name-derivation would be ceremony.
#
# Renaming either the MCP tools or adding the missing noun submodule
# would be a breaking change for MCP clients calling by tool name AND
# would broaden the Python public API surface beyond what sac actually
# intends (sac is a CLI/MCP-first tool, not a Python library — the
# noun-submodule `__all__`s are convenience re-exports for script
# users, not the canonical command surface).
#
# This is the exact shape `mcp_parity_exempt` was designed for; see
# scitex_dev/_cli/audit/_summary/_mcp_parity.py:9-13 ("Some packages
# legitimately expose far more MCP tools than Python-API functions").
mcp_parity_exempt = true

# §6a — per-package env-var prefix allowlist.
#
# scitex-agent-container ships an operator-facing ``SAC_*`` env-var
# surface that pre-dates the SciTeX-ecosystem ``SCITEX_<PKG>_*``
# convention. Operator-authored shell exports, ~/.dotfiles, agent
# spec ``env:`` blocks, and the dotfiles hook ecosystem all reference
# these literal names; renaming them to ``SCITEX_AGENT_CONTAINER_*``
# would break every running deployment without buying any operator-
# visible upside (the brand prefix IS the established operator
# surface, not a noise-silencer for new code that should have used
# the canonical prefix).
#
# Examples of the surface this opts in:
#   * ``SAC_LISTEN_BEARER`` / ``SAC_LISTEN_BASE_URL`` — bus auth +
#     dial address the channel reads at startup.
#   * ``SAC_HOST`` / ``SAC_NAME`` — runtime identity overrides.
#   * ``SAC_ANTHROPIC_API_KEY`` / ``SAC_CHANNEL_AUTO_ACK`` —
#     channel-mode operator toggles.
#   * ``SAC_SSH_CONTROL_DIR`` / ``SAC_PROBE_LOG_ROOT`` /
#     ``SAC_HOST_IDENTITY_PATH`` /
#     ``SAC_LISTEN_POST_ACK_LIVENESS_TIMEOUT_S`` — operations knobs.
#
# Spec: scitex_dev/_cli/audit/_summary/_env_allowlist.py — the entry
# applies "equal-to-stripped or prefix-match", so ``"SAC_"`` matches
# every ``SAC_*`` env var without listing them individually. New
# code that does not need brand-compat MUST still use the canonical
# ``SCITEX_AGENT_CONTAINER_*`` prefix — this allowlist closes the
# audit-cli ERROR on the legacy surface, not on future regressions.
env_allowlist = ["SAC_"]

[tool.hatch.build.targets.wheel]
packages = ["src/scitex_agent_container"]

[tool.hatch.build.targets.wheel.force-include]
"src/scitex_agent_container/cron/post-merge-pull.sh" = "scitex_agent_container/cron/post-merge-pull.sh"
# Bundle pyproject.toml + README.md inside the wheel so the
# source-bundled SIF build (cli_pkg/_image_source_build.py) can
# reconstruct a pip-installable source tree from the INSTALLED
# package — needed when sac was installed from a wheel and the
# original repo root is no longer on disk. The .def's ``uv pip
# install /opt/scitex-agent-container-src`` requires pyproject.toml
# at the staging-root, AND README.md alongside it (pyproject's
# ``readme = "README.md"`` makes hatchling read the file at build
# time). stage_build_context resolves both from this bundled copy
# (with a fallback to the editable-install repo root).
"pyproject.toml" = "scitex_agent_container/_bundled/pyproject.toml"
"README.md" = "scitex_agent_container/_bundled/README.md"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short -m 'not integration and not docker_smoke'"
markers = [
    "integration: slow end-to-end tests that spawn a real Claude Code agent (require claude CLI + tmux + ANTHROPIC_API_KEY or SAC_ANTHROPIC_API_KEY). Opt in with '-m integration'.",
    "docker_smoke: real-Docker smoke tests for DockerRuntime (build image, start/stop newbie-docker agent, exec claude -p). Skipped unless docker daemon reachable. Opt in with '-m docker_smoke'.",
    "slow: slow tests opted-in with '-m slow'.",
    "e2e: end-to-end tests requiring real subsystems (set RUN_E2E=1 to enable)",
    "smoke: fast (<60s total) user-facing happy-path tests verifying the installed `sac` binary still works end-to-end. Run on every PR.",
]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.coverage.run]
# Subprocess + multi-process coverage: child Python interpreters
# (subprocess.run, jupyter nbconvert --execute, etc.) are wired in via
# tests/conftest.py force-set of COVERAGE_PROCESS_START + a .pth shim.
# See ~/proj/scitex-dev/src/scitex_dev/_skills/general/05_development_06_subprocess-coverage.md.
parallel = true
branch = true
source = ["scitex_agent_container"]
concurrency = ["multiprocessing", "thread"]
