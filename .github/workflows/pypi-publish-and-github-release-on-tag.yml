name: release

# Tag-driven release pipeline — LIGHTWEIGHT GitHub-hosted variant (this repo is
# Bun/TypeScript with a thin Python packaging wrapper, not a native-Python/
# pytest package — see scitex-dev consult, 2026-07-11).
#
# The intended operator flow is:
#
#     git tag vX.Y.Z && git push origin vX.Y.Z
#
# Everything else fires automatically:
#
#   1. test          — bun test (ts/) + the Python-wrapper import/shell tests,
#                      on GitHub-hosted ubuntu-latest. Must pass or the
#                      pipeline halts; nothing is published until green.
#   2. build         — sdist built via `python -m build`, uploaded as artifact.
#   3. publish       — PyPI via OIDC trusted publishing (pypa/gh-action-pypi-
#                      publish). Trusted-publisher config on PyPI keys off the
#                      exact repo + this workflow's filename — keep this name
#                      in sync with the fleet standard
#                      (`pypi-publish-and-github-release-on-tag.yml`), or a
#                      correctly-authorized owner/repo will still fail with
#                      "invalid-publisher" on a filename mismatch.
#   4. release       — GitHub Release with auto-generated notes + artifacts.
#
# develop→main promotion is a DELIBERATE, separate PR (operator policy);
# this pipeline never auto-syncs main.
#
# Manual re-run: the workflow also accepts a `version` input via
# workflow_dispatch so you can re-publish without re-tagging.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to publish (e.g. v0.5.2) — must already exist on the repo'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF#refs/tags/}"
          else
            v="${{ inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.version }}
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyyaml
      - name: Run shell tests
        run: bash tests/test-state-detection.sh

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF#refs/tags/}"
          else
            v="${{ inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.version }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: ts
      - name: Run TypeScript tests
        run: bun test
        working-directory: ts

  build:
    needs: [test, test-ts]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF#refs/tags/}"
          else
            v="${{ inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.version }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build distribution
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/claude-code-telegrammer
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # PROVE IT LANDED. A green publish step is not evidence the artifact
      # exists — it is only evidence the upload call returned.
      #
      # v0.5.1 and v0.5.2 are tagged, pushed, and 404 on PyPI. They were cut
      # during a workflow migration on 2026-07-11 and simply never published.
      # Nobody noticed for three days, because nothing ever asked PyPI whether
      # the release had actually arrived. sac found EIGHT such ghost tags in
      # their own package — a third of a release line, silent for months.
      #
      # Query the VERSION-SPECIFIC JSON API, never /simple/: the simple index
      # is CDN-cached and can answer 200 for a version that is not really there
      # yet (or serve a stale listing), which would make this check a liar.
      #
      # Retry, because PyPI's API is eventually consistent for a minute or so
      # after an upload. Failing here turns a SILENT ghost into a RED release —
      # which is the entire point.
      - name: Verify the release actually landed on PyPI
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version }}"
          VERSION="${VERSION#v}"
          URL="https://pypi.org/pypi/claude-code-telegrammer/${VERSION}/json"

          for attempt in 1 2 3 4 5 6; do
            CODE=$(curl -sS -o /tmp/pypi.json -w '%{http_code}' "$URL" || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "PyPI confirms ${VERSION} is live:"
              python3 -c "
          import json
          d = json.load(open('/tmp/pypi.json'))
          assert d['info']['version'] == '${VERSION}', d['info']['version']
          urls = d['urls']
          assert urls, 'version exists but has NO uploaded files'
          for u in urls:
              print(f\"  {u['packagetype']:12s} {u['filename']}  {u['size']}B\")
          "
              exit 0
            fi
            echo "attempt ${attempt}: PyPI says HTTP ${CODE} for ${VERSION} — retrying in 15s"
            sleep 15
          done

          echo "::error::GHOST RELEASE — tag ${VERSION} was published by this workflow, but PyPI still 404s it."
          echo "The upload step went green and the artifact never arrived. Do NOT trust the tag."
          exit 1

  release:
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.version }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      # No CHANGELOG.md convention in this repo (unlike native-Python scitex-*
      # packages) — use GitHub's auto-generated release notes (derived from
      # merged PRs since the last tag) instead of a hand-maintained changelog.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
