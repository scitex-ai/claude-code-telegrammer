name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python ${{ matrix.python-version }} (uv-managed)
        run: uv python install ${{ matrix.python-version }}
      - name: Install package + pyyaml in a uv venv
        # Spartan self-hosted runners' Pythons are uv-managed / PEP 668
        # externally-managed, so system `pip install` fails with
        # "externally-managed-environment". uv venv + uv pip is the
        # ecosystem-standard install path on self-hosted.
        run: |
          uv venv --python ${{ matrix.python-version }} .venv
          uv pip install --python .venv/bin/python -e .
          uv pip install --python .venv/bin/python pyyaml
      - name: Run shell tests
        # .venv/bin on PATH so the shell suite's `python3` (and pyyaml, used by
        # lib/common.sh yaml_get) resolves to the venv interpreter.
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          bash tests/test-state-detection.sh

  test-ts:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: ts
      - name: Run TypeScript tests
        run: bun test
        working-directory: ts
